<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Title -->
    <title>ヴァッディのラーメン | Rohit Vaddi</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Theme Style -->
    <link href="css/style.css" rel="stylesheet">

    <!-- Favicon -->
    <link href="img/favicon.svg" rel="shortcut icon" type="image/svg+xml">
  </head>
  <body>

    <!-- Custom cursor -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <!-- Loading screen -->
    <div id="loading">
      <span class="l-lantern">🏮</span>
      <div class="l-kanji">ヴァッディのラーメン</div>
      <div class="l-eng">Vaddi's Ramen</div>
      <div class="l-role">Rohit Vaddi · Portfolio</div>
      <div class="l-wait">少々お待ちください</div>
      <div class="l-bar"><div class="l-fill" id="lfill"></div></div>
    </div>

    <!-- HUD -->
    <div id="nametag">
      <div class="nt-jp">ヴァッディのラーメン</div>
      <div class="nt-en">Rohit Vaddi · Portfolio</div>
    </div>
    <div id="hint">Move mouse to look around &nbsp;·&nbsp; Click glowing items to order</div>

    <!-- Tooltip -->
    <div id="tooltip">
      <span id="tooltip-jp"></span>
      <span id="tooltip-en"></span>
    </div>

    <!-- Info Panel -->
    <div id="panel">
      <div id="panel-close">
        <button onclick="closePanel()">✕</button>
      </div>
      <div id="panel-inner"></div>
    </div>

    <!-- Three.js UMD build (works on file:// without a server) -->
    <script src="assets/three/three.min.js"></script>

    <!-- Main scene script -->
    <script src="js/main.js"></script>

  </body>
</html>
